php-version = "8.4"

[source]
paths = ["src", "tests"]
includes = ["vendor"]
excludes = ["tests/Test262/scripts"]

[linter]
integrations = ["phpunit"]

[linter.rules.assertion-style]
level = "error"

[linter.rules.literal-named-argument]
level = "error"

# PlainDateTime/ZonedDateTime test suites require 100+ test methods because each
# virtual property, method, and option path per the TC39 spec must be covered.
# ZonedDateTime is inherently the most complex class per the spec (29 properties,
# 25+ methods plus a full disambiguation/offset-option/calendar matrix).
[linter.rules.too-many-methods]
level = "error"
threshold = 130

# PlainDate has 13+ virtual properties; PlainDateTime has 22 (9 time fields + 13 calendar)
# ZonedDateTime has 29 (3 stored + 1 private cache + 25 virtual properties per TC39 spec)
[linter.rules.too-many-properties]
level = "error"
threshold = 35

# Class-level cyclomatic complexity on Duration (~700), ZonedDateTime (~684),
# and PlainDateTime (~330) is dominated by the full TC39 rounding/diff/add matrix
# across 10 duration fields × 9 rounding modes × signed/IANA-vs-offset branches.
# These numbers reflect the inherent TC39 spec structure; splitting them would
# require moving logic across method boundaries the spec keeps together.
[linter.rules.cyclomatic-complexity]
level = "warning"
threshold = 750

# Kan-defect scores are dominated by control-flow density across the 10 Duration
# fields × 9 TC39 rounding modes × sign handling matrix in Duration, ZonedDateTime,
# and PlainDateTime. These classes implement the TC39 spec 1:1 and cannot be split
# without moving logic across method boundaries that the spec keeps together.
[linter.rules.kan-defect]
level = "warning"
threshold = 35.0

# Duration.assertDuration-style test helpers assert all 10 Duration fields in a
# single call; ZonedDateTime::with() accepts 13 TC39-spec date/time/calendar
# fields plus 3 option enums; localToZdt receives the full 6-field local
# date/time plus timezone and option bag. These are inherent to the TC39 spec
# and cannot be split without making the call sites worse.
[linter.rules.excessive-parameter-list]
level = "warning"
threshold = 16

# Halstead volumes/effort are dominated by the TC39 parsing, add/subtract, and
# round/diff algorithms in Duration, ZonedDateTime, and PlainDateTime, which must
# handle all 10 duration fields × 9 rounding modes × signed paths in one call.
# Thresholds are sized to accommodate spec-level algorithms without masking
# genuinely out-of-control methods.
[linter.rules.halstead]
level = "warning"
volume-threshold = 12000
effort-threshold = 250000
difficulty-threshold = 22
